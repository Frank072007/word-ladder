<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Ladder</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: #1a1c22;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .wl-root { max-width: 560px; width: 100%; }

    .wl-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #E8A84A;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .wl-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 2rem;
    }

    .wl-card {
      background: #2a2d35;
      border: 1px solid #3a3d45;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .wl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .wl-field { margin-bottom: 1.25rem; }

    .wl-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #E8A84A;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .wl-input {
      width: 100%;
      height: 42px;
      background: #1e2028;
      border: 1px solid #3a3d45;
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .wl-input:focus {
      border-color: #E8A84A;
      box-shadow: 0 0 0 3px rgba(232,168,74,0.15);
    }

    .wl-input::placeholder { color: #555; }

    .wl-divider { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .wl-divider-line { flex: 1; height: 1px; background: #3a3d45; }
    .wl-divider-text { font-family: 'DM Mono', monospace; font-size: 10px; color: #555; letter-spacing: 0.1em; }

    .wl-btn {
      width: 100%;
      height: 46px;
      background: #E8A84A;
      color: #1a1c22;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .wl-btn:hover { background: #d4943a; }
    .wl-btn:active { transform: scale(0.98); }

    .wl-result { display: none; }
    .wl-result.visible { display: block; }

    .wl-result-meta {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #E8A84A;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }

    .wl-result-meta span {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .wl-empty { font-family: 'DM Mono', monospace; font-size: 13px; color: #555; }

    .ladder-outer {
      display: flex;
      justify-content: center;
    }

    .ladder-frame {
      display: flex;
      align-items: stretch;
    }

    .ladder-rail {
      width: 14px;
      background: linear-gradient(to right, #b8732a, #e8a84a, #b8732a);
      border-radius: 7px;
      flex-shrink: 0;
    }

    .ladder-rail.right {
      background: linear-gradient(to left, #b8732a, #e8a84a, #b8732a);
    }

    .ladder-inner {
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .ladder-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tile {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      background: #2a2d35;
      border: 1px solid #3a3d45;
      color: #f0f0f0;
    }

    .tile.changed {
      background: #E8A84A;
      border-color: #E8A84A;
      color: #1a1c22;
    }

    .tile.first-word {
      background: #1D9E75;
      border-color: #1D9E75;
      color: #fff;
    }

    .tile.last-word {
      background: #534AB7;
      border-color: #534AB7;
      color: #fff;
    }

    .ladder-rung {
      width: 100%;
      height: 10px;
      background: linear-gradient(to bottom, #e8a84a, #b8732a);
      border-radius: 5px;
      margin: 8px 0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="wl-root">
    <p class="wl-eyebrow">COS 335</p>
    <h1 class="wl-title">Word Ladder<br>Solver</h1>

    <div class="wl-card">
      <div class="wl-row">
        <div class="wl-field">
          <label class="wl-label" for="begin">Begin</label>
          <input class="wl-input" id="begin" placeholder="hit" />
        </div>
        <div class="wl-field">
          <label class="wl-label" for="end">End</label>
          <input class="wl-input" id="end" placeholder="cog" />
        </div>
      </div>
      <div class="wl-field">
        <label class="wl-label" for="words">Word list</label>
        <input class="wl-input" id="words" placeholder="hot, dot, dog, lot, log, cog" />
      </div>
      <div class="wl-divider">
        <div class="wl-divider-line"></div>
        <span class="wl-divider-text">comma separated</span>
        <div class="wl-divider-line"></div>
      </div>
      <button class="wl-btn" onclick="solve()">Solve ladder</button>
    </div>

    <div class="wl-result" id="result-box">
      <p class="wl-result-meta" id="result-meta"></p>
      <div class="ladder-outer">
        <div class="ladder-frame">
          <div class="ladder-rail"></div>
          <div class="ladder-inner" id="result-path"></div>
          <div class="ladder-rail right"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function renderLadder(path) {
      const container = document.getElementById('result-path');
      container.innerHTML = '';

      path.forEach((word, i) => {
        const prev = path[i - 1] || null;
        const letters = word.split('');
        const isFirst = i === 0;
        const isLast = i === path.length - 1;

        const row = document.createElement('div');
        row.className = 'ladder-row';

        letters.forEach((letter, j) => {
          const tile = document.createElement('div');
          const isChanged = prev && prev[j] !== letter;
          tile.className = 'tile' + (isFirst ? ' first-word' : isLast ? ' last-word' : isChanged ? ' changed' : '');
          tile.textContent = letter.toUpperCase();
          row.appendChild(tile);
        });

        container.appendChild(row);

        if (i < path.length - 1) {
          const rung = document.createElement('div');
          rung.className = 'ladder-rung';
          container.appendChild(rung);
        }
      });
    }

    function setMeta(steps) {
      const meta = document.getElementById('result-meta');
      meta.innerHTML = steps + ' <span>step' + (steps !== 1 ? 's' : '') + '</span>';
    }

    async function solve() {
      const begin = document.getElementById("begin").value.trim().toLowerCase();
      const end = document.getElementById("end").value.trim().toLowerCase();
      const words = document.getElementById("words").value
        .split(",")
        .map(w => w.trim().toLowerCase())
        .filter(Boolean);

      const box = document.getElementById("result-box");
      box.classList.add("visible");
      setMeta('...');
      document.getElementById("result-path").innerHTML = "";

      try {
        const res = await fetch("/ladder", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ begin, end, words })
        });
        const data = await res.json();
        if (!data.path || data.path.length === 0) {
          document.getElementById('result-meta').innerHTML = 'No path found';
          document.getElementById("result-path").innerHTML = '<span class="wl-empty">Try a different word list.</span>';
        } else {
          setMeta(data.steps);
          renderLadder(data.path);
        }
      } catch (e) {
        document.getElementById('result-meta').innerHTML = 'Error';
        document.getElementById("result-path").innerHTML = '<span class="wl-empty">Could not reach server.</span>';
      }
    }
  </script>
</body>
</html>
